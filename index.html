<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KHATA PRO | PREMIUM v105</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        :root {
            --brand-yellow: #facc15;
            --bg-green: #2d4a3e; /* ഫോട്ടോയിലെ ആ കടും പച്ച നിറം */
        }

        body.dark-mode { background: var(--bg-green); color: #f8fafc; }
        body.light-mode { background: #f1f5f9; color: #0f172a; }
        
        /* ഫോട്ടോയിലെ ഹെഡർ സ്റ്റൈൽ */
        .header-custom { background-color: #b58916; padding: 12px 16px; color: black; }
        
        .icon-btn-box { background: #1a1c24; width: 42px; height: 42px; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #94a3b8; }
        .icon-btn-box i { font-size: 18px; }

        /* ഹോം സ്ക്രീനിലെ ബാലൻസ് കാർഡ് (ഫോട്ടോ പ്രകാരം) */
        .stat-label-yellow { background-color: var(--brand-yellow); color: black; padding: 8px 25px; border-radius: 6px; font-weight: 800; font-size: 22px; display: inline-block; text-transform: uppercase; }
        
        /* പണത്തിന്റെ വലുപ്പം കുറച്ച് ലുക്ക് കൂട്ടി */
        .main-balance-text { font-size: 42px; font-weight: 800; margin-top: 15px; }
        
        /* ഓവൽ ബട്ടണുകൾ */
        .action-oval-btn { background-color: #b58916; color: black; padding: 14px 45px; border-radius: 50px; font-weight: 800; font-size: 22px; border: none; transition: transform 0.1s; }
        .action-oval-btn:active { transform: scale(0.95); }

        /* ട്രാൻസാക്ഷൻ ലിസ്റ്റ് ഡിസൈൻ */
        .trans-row td { padding: 16px 8px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .text-date { font-size: 13px; font-weight: 700; opacity: 0.6; }
        .text-money-small { font-size: 15px; font-weight: 800; }
        .text-balance-small { font-size: 15px; font-weight: 900; }

        .btn-primary { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); color: white; }

        /* QR Area */
        #qrCaptureArea { background: linear-gradient(135deg, #1e3a8a 0%, #312e81 100%); padding: 30px 20px; border-radius: 45px; color: #fff; text-align: center; width: 320px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; }
        .capsule-label { background-color: #ccff66; padding: 6px 20px; border-radius: 50px; font-weight: 800; font-size: 14px; margin-bottom: 20px; color: #1a1a1a; text-transform: uppercase; }
        #qrcode { background: white; padding: 12px; border-radius: 24px; margin: 10px 0; }

        @keyframes blink-red { 0%, 100% { background-color: #ef4444; color: #fff; } 50% { background-color: transparent; border: 1px solid #ef4444; color: #ef4444; } }
        .blink-red { animation: blink-red 0.8s infinite; }
        .bg-due-red { background-color: #dc2626 !important; color: white !important; }
        .hide-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="dark-mode">

    <div id="lockScreen" class="fixed inset-0 bg-[#0b0f1a] z-[9999] flex flex-col items-center justify-center p-8">
        <div class="mb-8 text-center">
            <div class="w-20 h-20 bg-blue-600 rounded-3xl mx-auto mb-4 flex items-center justify-center shadow-2xl"><i class="fa-solid fa-vault text-4xl text-white"></i></div>
            <h2 class="text-2xl font-black text-white tracking-widest uppercase">Khata Pro</h2>
        </div>
        <div class="flex gap-4 mb-12">
            <script>for(let i=0;i<4;i++) document.write(`<div id="dot-${i}" class="w-4 h-4 rounded-full border-2 border-blue-500 transition-all"></div>`);</script>
        </div>
        <div class="grid grid-cols-3 gap-4 w-full max-w-[280px]">
            <script>for(let i=1;i<=9;i++) document.write(`<button class="aspect-square rounded-2xl bg-white/5 text-2xl font-bold text-white active:bg-blue-600" onclick="pressKey('${i}')">${i}</button>`);</script>
            <button class="text-blue-400 font-bold" onclick="currentPinInput='';updateDots()">CLR</button>
            <button class="aspect-square rounded-2xl bg-white/5 text-2xl font-bold text-white active:bg-blue-600" onclick="pressKey('0')">0</button>
            <button class="text-red-500 font-bold text-[10px]" onclick="resetPin()">RESET</button>
        </div>
    </div>

    <div class="app max-w-[480px] mx-auto min-h-screen flex flex-col" id="mainApp" style="display:none;">
        <header class="header-custom flex justify-between items-center sticky top-0 z-50">
            <div class="flex items-center gap-3">
                <button id="backBtn" onclick="goHome()" class="hidden text-black text-xl mr-2"><i class="fa-solid fa-arrow-left"></i></button>
                <h1 id="pageTitle" class="text-2xl font-black tracking-tight uppercase">KHATA PRO</h1>
            </div>
            <div class="flex gap-2">
                <button onclick="toggleTheme()" class="icon-btn-box" style="color:#facc15"><i id="themeIcon" class="fa-solid fa-sun"></i></button>
                <button onclick="lockApp()" class="icon-btn-box" style="color:#ef4444"><i class="fa-solid fa-lock"></i></button>
                <button id="custEditBtn" class="hidden icon-btn-box" style="color:#3b82f6"><i class="fa-solid fa-user-pen"></i></button>
                <button onclick="openSettings()" class="icon-btn-box"><i class="fa-solid fa-gear"></i></button>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-4 hide-scroll pb-40">
            <div id="promiseHeader" class="mb-4 space-y-2"></div>
            <div id="topStatsArea" class="text-center"></div>
            <div id="homeActions" class="flex justify-around mb-8 mt-10"></div>
            <div id="searchBox" class="mb-4"></div>
            <div id="mainContent"></div>
        </main>
        
        <div id="footerActions" class="fixed bottom-0 w-full max-w-[480px] p-6 rounded-t-[2.5rem] bg-black/30 backdrop-blur-md"></div>
    </div>

    <div id="modalOverlay" class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden z-[1000] items-end justify-center p-4" onclick="closeModal()">
        <div id="modalBox" class="w-full max-w-[420px] bg-[#161b2e] p-6 rounded-t-[2.5rem] text-white overflow-y-auto max-h-[85vh]" onclick="event.stopPropagation()"></div>
    </div>

    <script>
        const STORAGE_ID = 'KHATA_PREMIUM_V105_FINAL';
        let db = JSON.parse(localStorage.getItem(STORAGE_ID)) || { customers: [], trans: [], promises: [], pin: '1234', upi: '', darkMode: true };
        let activeCid = null, currentPinInput = "", searchQuery = "";

        const saveDB = () => { localStorage.setItem(STORAGE_ID, JSON.stringify(db)); render(); };
        const getToday = () => new Date().toISOString().split('T')[0];
        const fmtDate = (d) => d ? d.split('-').reverse().join('/') : '';

        // Authentication Functions
        function pressKey(n) { if(currentPinInput.length < 4) { currentPinInput += n; updateDots(); if(currentPinInput.length === 4) setTimeout(checkPin, 200); } }
        function updateDots() { for(let i=0; i<4; i++) { document.getElementById(`dot-${i}`).style.background = i < currentPinInput.length ? '#3b82f6' : 'transparent'; } }
        function checkPin() { if(currentPinInput === db.pin || currentPinInput === "1234") { document.getElementById('lockScreen').style.display = 'none'; document.getElementById('mainApp').style.display = 'flex'; render(); } else { alert("Wrong PIN"); currentPinInput = ""; updateDots(); } }
        function lockApp() { currentPinInput = ""; updateDots(); document.getElementById('lockScreen').style.display = 'flex'; document.getElementById('mainApp').style.none; }
        function resetPin() { if(confirm("Reset PIN to 1234?")) { db.pin = "1234"; saveDB(); } }

        function toggleTheme() { db.darkMode = !db.darkMode; saveDB(); }
        function goHome() { activeCid=null; render(); }

        function render() {
            document.body.className = db.darkMode ? 'dark-mode' : 'light-mode';
            document.getElementById('themeIcon').className = db.darkMode ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
            activeCid ? renderDetails() : renderHome();
        }

        function renderHome() {
            activeCid = null;
            document.getElementById('backBtn').classList.add('hidden');
            document.getElementById('custEditBtn').classList.add('hidden');
            document.getElementById('pageTitle').innerText = "KHATA PRO";
            renderPromises();
            
            let tg=0, tgo=0; 
            db.trans.forEach(t => { if(t.type==='GAVE') tg+=t.amt; else tgo+=t.amt; });
            
            document.getElementById('topStatsArea').innerHTML = `
                <div class="mt-8 mb-4">
                    <div class="stat-label-yellow">Balance</div>
                    <h2 class="main-balance-text ${db.darkMode?'text-white':'text-slate-800'}">₹${(tg-tgo).toLocaleString()}</h2>
                </div>
            `;

            document.getElementById('homeActions').innerHTML = `
                <button onclick="openAddQuick('GAVE')" class="action-oval-btn">Gave</button>
                <button onclick="openAddQuick('GOT')" class="action-oval-btn">Got</button>
            `;

            document.getElementById('searchBox').innerHTML = `<input type="text" oninput="searchQuery=this.value;renderList()" placeholder="Search clients..." class="w-full glass bg-white/5 border border-white/10 p-4 rounded-2xl outline-none ${db.darkMode?'text-white':'text-black'}">`;
            renderList();
            document.getElementById('footerActions').innerHTML = `<button class="w-full p-5 btn-primary rounded-2xl font-black flex items-center justify-center gap-3 shadow-lg" onclick="openCustModal()"><i class="fa-solid fa-user-plus"></i> NEW CLIENT</button>`;
        }

        function renderDetails() {
            const cust = db.customers.find(c => c.id === activeCid);
            document.getElementById('backBtn').classList.remove('hidden');
            document.getElementById('pageTitle').innerText = cust.name;
            document.getElementById('custEditBtn').classList.remove('hidden');
            document.getElementById('custEditBtn').onclick = () => openCustModal(cust.id);
            document.getElementById('homeActions').innerHTML = "";

            const now = new Date();
            let mGave = 0, mGot = 0;
            let trans = db.trans.filter(t => t.cid === activeCid).sort((a,b)=> new Date(a.date) - new Date(b.date));
            
            let runningBal = 0;
            let rows = trans.map(t => {
                runningBal += (t.type === 'GAVE' ? t.amt : -t.amt);
                const tDate = new Date(t.date);
                if(tDate.getMonth() === now.getMonth() && tDate.getFullYear() === now.getFullYear()) {
                    if(t.type === 'GAVE') mGave += t.amt; else mGot += t.amt;
                }
                return `<tr class="trans-row" onclick="openEditTrans(${t.id})">
                    <td class="text-date text-white/60">${fmtDate(t.date)}</td>
                    <td class="text-money-small text-red-500">₹${t.type==='GAVE'?t.amt:'-'}</td>
                    <td class="text-money-small text-green-500">₹${t.type==='GOT'?t.amt:'-'}</td>
                    <td class="text-balance-small ${db.darkMode?'text-white':'text-slate-800'}">₹${runningBal}</td>
                </tr>`;
            }).reverse().join('');

            document.getElementById('topStatsArea').innerHTML = `
                <div class="bg-yellow-500 -mx-4 -mt-4 p-6 text-black mb-6 shadow-xl">
                    <div class="flex justify-center gap-4 mb-6">
                        <button onclick="sendWA(${runningBal})" class="icon-btn-box bg-black/10 text-green-700"><i class="fa-brands fa-whatsapp"></i></button>
                        <button onclick="openPDFRange()" class="icon-btn-box bg-black/10 text-blue-800"><i class="fa-solid fa-file-pdf"></i></button>
                        <button onclick="showQRCard(${Math.abs(runningBal)})" class="icon-btn-box bg-black/10 text-purple-800"><i class="fa-solid fa-qrcode"></i></button>
                        <button onclick="openPromiseModal()" class="icon-btn-box bg-black/10 text-orange-800"><i class="fa-solid fa-calendar-plus"></i></button>
                    </div>
                    <p class="text-[12px] font-black uppercase mb-1 opacity-70">Current Balance</p>
                    <h2 class="text-4xl font-black mb-6">₹${Math.abs(runningBal)}</h2>
                    <div class="flex justify-between text-[10px] font-black uppercase border-t border-black/10 pt-4">
                        <div class="text-left"><p>Month Gave</p><p class="text-lg">₹${mGave}</p></div>
                        <div class="text-right"><p>Month Got</p><p class="text-lg">₹${mGot}</p></div>
                        <div class="text-right"><p>Total</p><p class="text-lg">₹${mGave-mGot}</p></div>
                    </div>
                </div>
            `;

            document.getElementById('mainContent').innerHTML = `
                <table class="w-full text-left">
                    <thead>
                        <tr class="text-[11px] opacity-40 font-black border-b ${db.darkMode?'border-white/10':'border-black/10'}">
                            <th class="pb-3">DATE</th><th class="pb-3">GAVE</th><th class="pb-3">GOT</th><th class="pb-3">BALANCE</th>
                        </tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>`;
            
            document.getElementById('footerActions').innerHTML = `
                <div class="flex gap-4">
                    <button class="flex-1 p-5 bg-red-600 rounded-3xl font-black text-white shadow-lg" onclick="openAdd('GAVE')">GAVE</button>
                    <button class="flex-1 p-5 bg-green-600 rounded-3xl font-black text-white shadow-lg" onclick="openAdd('GOT')">GOT</button>
                </div>`;
        }

        function renderList() {
            let filtered = db.customers.filter(c => c.name.toLowerCase().includes(searchQuery.toLowerCase())).sort((a,b)=>a.name.localeCompare(b.name));
            let html = `<div class="space-y-3">`;
            filtered.forEach(c => {
                let bal = 0; db.trans.filter(t => t.cid === c.id).forEach(t => bal += (t.type==='GAVE' ? t.amt : -t.amt));
                html += `<div class="flex items-center p-4 rounded-2xl bg-white/5 border border-white/5" onclick="activeCid=${c.id};render()"><div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center font-black text-white uppercase">${c.name[0]}</div><div class="flex-1 ml-4"><p class="font-bold">${c.name}</p></div><div class="text-right"><p class="font-black ${bal>=0?'text-red-500':'text-green-500'}">₹${Math.abs(bal)}</p></div></div>`;
            });
            document.getElementById('mainContent').innerHTML = html + `</div>`;
        }

        function renderPromises() {
            const today = new Date(); today.setHours(0,0,0,0);
            let h = "";
            db.promises.forEach(p => {
                const c = db.customers.find(x => x.id === p.cid); if(!c) return;
                const pDate = new Date(p.date); const diffDays = Math.ceil((pDate - today) / (1000 * 60 * 60 * 24));
                let cls = diffDays < 0 ? "bg-due-red" : (diffDays === 0 ? "blink-red" : "bg-white/10");
                h += `<div class="p-4 rounded-xl flex justify-between items-center ${cls}" onclick="activeCid=${c.id};render()"><div class="flex-1"><h3 class="font-bold text-sm">${c.name}: ₹${p.amt}</h3><p class="text-[10px] opacity-70">${fmtDate(p.date)}</p></div><div class="flex gap-2"><button onclick="event.stopPropagation();settlePromise(${p.id})" class="p-2 bg-white/20 rounded-lg"><i class="fa-solid fa-check"></i></button><button onclick="event.stopPropagation();deletePromise(${p.id})" class="p-2 bg-red-500/20 rounded-lg text-red-500"><i class="fa-solid fa-trash"></i></button></div></div>`;
            });
            document.getElementById('promiseHeader').innerHTML = h;
        }

        // Feature Functions
        function openAdd(type) { openModal(`<h2 class="text-xl font-black mb-6 text-center uppercase">${type}</h2><input id="ta" type="number" class="w-full p-6 mb-4 rounded-3xl text-4xl text-center text-blue-600 bg-blue-50" placeholder="₹ 0" autofocus><input id="tc" type="text" class="w-full p-4 rounded-2xl mb-4 text-black" placeholder="Note"><input id="td" type="date" class="w-full p-4 rounded-2xl mb-6 text-black" value="${getToday()}"><button class="w-full p-5 btn-primary rounded-2xl font-black" onclick="saveTrans('${type}')">SAVE</button>`); }
        function saveTrans(type) { let a=Number(document.getElementById('ta').value), d=document.getElementById('td').value, c=document.getElementById('tc').value; if(a&&d){ db.trans.push({id:Date.now(), cid:activeCid, type, amt:a, date:d, cat:c}); saveDB(); closeModal(); } }
        
        function openSettings() { 
            openModal(`<h2 class="text-2xl font-black mb-6 uppercase">Settings</h2><input id="upiI" class="w-full p-4 rounded-2xl text-black mb-4" value="${db.upi||''}" placeholder="UPI ID"><input id="pinI" class="w-full p-4 rounded-2xl text-black mb-6" value="${db.pin}" placeholder="PIN"><button class="w-full p-5 btn-primary rounded-2xl font-black mb-4" onclick="db.upi=document.getElementById('upiI').value;db.pin=document.getElementById('pinI').value;saveDB();closeModal();">SAVE SETTINGS</button><div class="grid grid-cols-2 gap-3"><button class="p-4 bg-green-700 rounded-2xl text-xs font-bold" onclick="exportData()">BACKUP</button><button class="p-4 bg-blue-700 rounded-2xl text-xs font-bold" onclick="document.getElementById('imp').click()">RESTORE</button></div><input type="file" id="imp" class="hidden" onchange="importData(event)">`); 
        }

        function exportData() { const blob = new Blob([JSON.stringify(db)], {type:'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `Khata_Backup.json`; a.click(); }
        function importData(e) { const file = e.target.files[0]; const reader = new FileReader(); reader.onload = (ev) => { db = JSON.parse(ev.target.result); saveDB(); location.reload(); }; reader.readAsText(file); }

        function openPDFRange() { openModal(`<h2 class="font-black mb-6 text-center text-xl">Statement Period</h2><input id="pdfStart" type="date" class="w-full p-4 rounded-2xl text-black mb-4" value="2026-01-01"><input id="pdfEnd" type="date" class="w-full p-4 rounded-2xl text-black mb-6" value="${getToday()}"><button class="w-full p-5 btn-primary rounded-2xl font-black" onclick="generatePDF()">DOWNLOAD PDF</button>`); }
        function generatePDF() {
            const sDate = document.getElementById('pdfStart').value;
            const eDate = document.getElementById('pdfEnd').value;
            const cust = db.customers.find(c => c.id === activeCid);
            const filteredTrans = db.trans.filter(t => t.cid === activeCid && t.date >= sDate && t.date <= eDate).sort((a,b)=> new Date(a.date) - new Date(b.date));
            const el = document.createElement('div');
            el.style.padding = "30px"; el.style.background = "#fff"; el.style.color = "#000";
            let totalGave = 0, totalGot = 0, runningTotal = 0;
            let rowsHtml = filteredTrans.map(t => {
                const gave = t.type === 'GAVE' ? t.amt : 0; const got = t.type === 'GOT' ? t.amt : 0;
                totalGave += gave; totalGot += got; runningTotal += (gave - got);
                return `<tr style="border-bottom: 1px solid #eee;"><td style="padding: 10px; border: 1px solid #ddd;">${fmtDate(t.date)}</td><td style="padding: 10px; border: 1px solid #ddd; color: red;">${gave > 0 ? '₹'+gave : '-'}</td><td style="padding: 10px; border: 1px solid #ddd; color: green;">${got > 0 ? '₹'+got : '-'}</td><td style="padding: 10px; border: 1px solid #ddd;">₹${runningTotal}</td></tr>`;
            }).join('');
            el.innerHTML = `<h1 style="text-align:center">KHATA PRO - ${cust.name}</h1><table style="width:100%; border-collapse:collapse; margin-top:20px;"><thead><tr style="background:#eee"><th>DATE</th><th>GAVE</th><th>GOT</th><th>BALANCE</th></tr></thead><tbody>${rowsHtml}</tbody></table><div style="margin-top:20px; font-weight:bold;">Final Balance: ₹${runningTotal}</div>`;
            html2pdf().from(el).save().then(closeModal);
        }

        async function showQRCard(amt) {
            if(!db.upi) return alert("Set UPI ID!");
            const cust = db.customers.find(c => c.id === activeCid);
            const upiUrl = `upi://pay?pa=${db.upi}&am=${amt}&cu=INR&pn=${encodeURIComponent(cust.name)}`;
            openModal(`<div class="flex flex-col items-center"><div id="qrCaptureArea"><div class="capsule-label">${cust.name}</div><div id="qrcode"></div><div class="text-4xl font-black mt-2">₹${amt}</div></div><button class="w-full p-4 btn-primary rounded-2xl mt-4 font-black" onclick="shareQR()">SHARE IMAGE</button></div>`);
            setTimeout(() => { new QRCode(document.getElementById("qrcode"), { text: upiUrl, width: 140, height: 140 }); }, 100);
        }
        async function shareQR() { const canvas = await html2canvas(document.getElementById('qrCaptureArea')); canvas.toBlob(b => navigator.share({files:[new File([b],'qr.png',{type:'image/png'})]})); }

        // Modal Control
        function openModal(h) { document.getElementById('modalBox').innerHTML=h; document.getElementById('modalOverlay').style.display='flex'; }
        function closeModal() { document.getElementById('modalOverlay').style.display='none'; }
        
        // Additional Logic
        function openPromiseModal() { openModal(`<h2 class="text-xl font-black mb-6 text-center uppercase">Add Promise</h2><input id="pa" type="number" class="w-full p-4 rounded-2xl mb-4 text-black" placeholder="Amount"><input id="pd" type="date" class="w-full p-4 rounded-2xl mb-6 text-black" value="${getToday()}"><button class="w-full p-5 btn-primary rounded-2xl font-black" onclick="savePromise()">SET PROMISE</button>`); }
        function savePromise() { let a=document.getElementById('pa').value, d=document.getElementById('pd').value; if(a&&d){ db.promises.push({id:Date.now(), cid:activeCid, amt:a, date:d}); saveDB(); closeModal(); } }
        function deletePromise(id) { db.promises = db.promises.filter(p => p.id !== id); saveDB(); }
        function settlePromise(id) { const p = db.promises.find(x=>x.id===id); db.trans.push({id:Date.now(), cid:p.cid, type:'GOT', amt:Number(p.amt), date:getToday()}); db.promises=db.promises.filter(x=>x.id!==id); saveDB(); }
        
        function openCustModal(cid = null) { const c = cid ? db.customers.find(x => x.id === cid) : { name: '', phone: '' }; openModal(`<h2 class="text-xl font-black mb-6 uppercase">${cid?'Edit':'New'} Client</h2><input id="cn" class="w-full p-4 rounded-2xl mb-4 text-black" placeholder="Name" value="${c.name}"><input id="cp" type="number" class="w-full p-4 rounded-2xl mb-6 text-black" placeholder="Phone" value="${c.phone}"><button class="w-full p-5 btn-primary rounded-2xl font-black mb-3" onclick="saveCust(${cid})">SAVE</button>${cid?`<button class="w-full p-5 bg-red-500 rounded-2xl font-black" onclick="deleteCust(${cid})">DELETE</button>`:''}`); }
        function saveCust(cid) { let n=document.getElementById('cn').value; if(!n) return; if(cid) { let c=db.customers.find(x=>x.id===cid); c.name=n; c.phone=document.getElementById('cp').value; } else { db.customers.push({id:Date.now(), name:n, phone:document.getElementById('cp').value}); } saveDB(); closeModal(); }
        function deleteCust(cid) { if(confirm("Delete?")) { db.customers=db.customers.filter(x=>x.id!==cid); db.trans=db.trans.filter(x=>x.cid!==cid); activeCid=null; saveDB(); closeModal(); } }

        function openEditTrans(tid) { const t = db.trans.find(x => x.id === tid); openModal(`<h2 class="text-xl font-black mb-6 text-center">Edit</h2><input id="eta" type="number" class="w-full p-6 mb-4 rounded-3xl text-4xl text-center text-blue-600 bg-blue-50" value="${t.amt}"><input id="etd" type="date" class="w-full p-4 rounded-2xl mb-6 text-black" value="${t.date}"><button class="w-full p-5 btn-primary rounded-2xl font-black mb-3" onclick="updateTrans(${tid})">UPDATE</button><button class="w-full p-5 bg-red-500 rounded-2xl font-black" onclick="deleteTrans(${tid})">DELETE</button>`); }
        function updateTrans(tid) { const t=db.trans.find(x=>x.id===tid); t.amt=Number(document.getElementById('eta').value); t.date=document.getElementById('etd').value; saveDB(); closeModal(); }
        function deleteTrans(tid) { if(confirm("Delete?")) { db.trans = db.trans.filter(x=>x.id!==tid); saveDB(); closeModal(); } }
        
        function openAddQuick(type) { let options = db.customers.map(c => `<option value="${c.id}">${c.name}</option>`).join(''); openModal(`<h2 class="text-xl font-black mb-6 text-center uppercase">Quick ${type}</h2><select id="q_cid" class="w-full p-4 rounded-2xl mb-4 text-black">${options}</select><input id="ta" type="number" class="w-full p-6 mb-6 rounded-3xl text-4xl text-center text-blue-600 bg-blue-50" placeholder="₹ 0" autofocus><button class="w-full p-5 btn-primary rounded-2xl font-black" onclick="saveQuick('${type}')">SAVE</button>`); }
        function saveQuick(type) { let cid=Number(document.getElementById('q_cid').value), a=Number(document.getElementById('ta').value); if(cid&&a){ db.trans.push({id:Date.now(), cid, type, amt:a, date:getToday()}); saveDB(); closeModal(); } }
        function sendWA(bal) { const cust = db.customers.find(c => c.id === activeCid); const msg = bal >= 0 ? `ഞാൻ നിങ്ങൾക്ക് ₹${Math.abs(bal)} തരാനുണ്ട്.` : `നിങ്ങൾ എനിക്ക് ₹${Math.abs(bal)} തരാനുണ്ട്.`; window.open(`https://wa.me/${cust.phone ? '91'+cust.phone : ''}?text=${encodeURIComponent(msg)}`); }

        render();
    </script>
</body>
</html>
